version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: fansync_user
      POSTGRES_PASSWORD: fansync_pass
      POSTGRES_DB: fansync_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: ../deployment/docker/server.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    depends_on:
      - db

  client:
    build:
      context: ./client
      dockerfile: ../deployment/docker/client.Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - server

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - client
      - server

volumes:
  postgres_data: